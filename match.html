      { id:'fujifilm-x-s20',     brand:'Fujifilm', model:'X-S20',             priceKrw:1780000, priceSummary:'약 1,780,000원', thumbnail:'images/cameras/fujifilm-x-s20.png',     scores:{ beginner:2,intermediate:3,advanced:2, photo:2,video:3,both:3, portable:2,quality:2,balance:3, noVideo:1,yesVideo:3, budget100:0,budget150:1,budget200:3,budget300:2, complexity:2,shake:3,battery:3,quality_c:2,price:1 }, tags:['OIS','배터리','영상+사진'] },
      { id:'canon-eos-r50-v',    brand:'Canon',    model:'EOS R50 V',         priceKrw:1180000, priceSummary:'약 1,180,000원', thumbnail:'images/cameras/canon-eos-r50-v.png',    scores:{ beginner:3,intermediate:2,advanced:1, photo:1,video:3,both:2, portable:2,quality:1,balance:2, noVideo:0,yesVideo:3, budget100:1,budget150:3,budget200:2,budget300:0, complexity:3,shake:1,battery:1,quality_c:1,price:2 }, tags:['세로촬영','브이로그','라이브'] },
    ];

    // ── Quiz questions ────────────────────────────
    const QUESTIONS = [
      {
        key: 'experience',
        text: '카메라를 얼마나 써보셨나요?',
        options: [
          { emoji:'🌱', label:'처음이에요, 잘 모릅니다',   value:'beginner' },

          { emoji:'🎯', label:'꽤 익숙하게 다뤄요',         value:'advanced' },
        ]
      },
      {
        key: 'purpose',
        text: '주로 어떤 콘텐츠를 만들고 싶으세요?',
        options: [
          { emoji:'🖼️', label:'사진 위주로 찍고 싶어요',   value:'photo' },
          { emoji:'🎬', label:'영상·브이로그가 메인이에요', value:'video' },
          { emoji:'✨', label:'사진과 영상 모두 해보고 싶어요', value:'both' },
        ]
      },
      {
        key: 'portability',
        text: '휴대성과 화질, 어느 쪽이 더 중요한가요?',
        options: [
          { emoji:'🎒', label:'항상 들고 다닐 수 있어야 해요', value:'portable' },
          { emoji:'🏆', label:'화질이 최우선이에요',           value:'quality' },
          { emoji:'⚖️', label:'적당히 균형이 맞으면 돼요',    value:'balance' },
        ]
      },
      {
        key: 'video',
        text: '영상 촬영 기능이 중요한가요?',
        options: [
          { emoji:'✅', label:'네, 영상 기능이 있어야 해요',    value:'yesVideo' },
          { emoji:'❌', label:'아니요, 사진만 찍을 것 같아요', value:'noVideo' },
        ]
      },
      {
        key: 'budget',
        text: '예산은 어느 정도인가요?',
        options: [
          { emoji:'💸', label:'100만원 이하',    value:'budget100' },
          { emoji:'💳', label:'100~150만원대',   value:'budget150' },
          { emoji:'💰', label:'150~250만원대',   value:'budget200' },
          { emoji:'🏦', label:'250만원 이상도 OK', value:'budget300' },
        ]
      },
      {
        key: 'concern',
        text: '카메라 구매에서 가장 걱정되는 게 뭔가요?',
        options: [
          { emoji:'😰', label:'조작이 너무 어려울 것 같아요', value:'complexity' },
          { emoji:'🤸', label:'흔들림이 많이 나올 것 같아요', value:'shake' },
          { emoji:'🔋', label:'배터리가 빨리 닳을 것 같아요', value:'battery' },
          { emoji:'📸', label:'원하는 화질이 안 나올 것 같아요', value:'quality_c' },
          { emoji:'💵', label:'가격 대비 만족이 낮을 것 같아요', value:'price' },
        ]
      },
    ];

    let currentQ = 0;
    const answers = {};

    // ── Build camera strip ────────────────────────
    function buildStrip() {
      const strip = document.getElementById('matchStrip');
      const doubled = [...CAMERAS, ...CAMERAS];
      strip.innerHTML = doubled.map(cam => `
        <div class="match-strip-card">
          <img class="match-strip-card__img" src="${cam.thumbnail}" alt="${cam.model}" onerror="this.src='images/cameras/default-camera.png'">
          <p class="match-strip-card__name">${cam.brand} ${cam.model}</p>
        </div>
      `).join('');
    }

    // ── Render question ───────────────────────────
    function renderQuestion() {
      const q = QUESTIONS[currentQ];
      const wrap = document.getElementById('questionWrap');

      document.getElementById('progressFill').style.width = ((currentQ / QUESTIONS.length) * 100) + '%';
      document.getElementById('progressLabel').textContent = (currentQ + 1) + ' / ' + QUESTIONS.length;
      document.getElementById('prevBtn').style.visibility = currentQ === 0 ? 'hidden' : 'visible';

      const isLast = currentQ === QUESTIONS.length - 1;
      const nextBtn = document.getElementById('nextBtn');
      nextBtn.innerHTML = isLast
        ? '결과 보기 <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>'
        : '다음 <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';
      nextBtn.disabled = !answers[q.key];

      wrap.innerHTML = `
        <p class="match-question__num">Q${currentQ + 1}</p>
        <p class="match-question__text">${q.text}</p>
        <div class="match-options">
          ${q.options.map(opt => `
            <button class="match-option ${answers[q.key] === opt.value ? 'is-selected' : ''}"
              data-value="${opt.value}" type="button">
              <span class="match-option__emoji">${opt.emoji}</span>
              ${opt.label}
            </button>
          `).join('')}
        </div>
      `;

      wrap.querySelectorAll('.match-option').forEach(btn => {
        btn.addEventListener('click', () => {
          answers[q.key] = btn.dataset.value;
          wrap.querySelectorAll('.match-option').forEach(b => b.classList.remove('is-selected'));
          btn.classList.add('is-selected');
          document.getElementById('nextBtn').disabled = false;
        });
      });
    }

    // ── Calculate scores ──────────────────────────
    function calcScores() {
      return CAMERAS.map(cam => {
        let score = 0;
        Object.values(answers).forEach(val => {
          if (cam.scores[val] !== undefined) score += cam.scores[val];
        });
        return { ...cam, score };
      }).sort((a, b) => b.score - a.score).slice(0, 3);
    }

    // ── Render results ────────────────────────────
    function renderResults() {
      const top3 = calcScores();
      const grid = document.getElementById('resultGrid');
      const rankColors = ['#f59e0b','#9ca3af','#cd7c54'];

      grid.innerHTML = top3.map((cam, i) => `
        <div class="match-result-card ${i === 0 ? 'match-result-card--top' : ''}">
          <span class="match-result-card__rank match-result-card__rank--${i+1}">${i+1}</span>
          <div class="match-result-card__thumb">
            <img src="${cam.thumbnail}" alt="${cam.model}" onerror="this.src='images/cameras/default-camera.png'">
          </div>
          <div class="match-result-card__body">
            <p class="match-result-card__brand">${cam.brand}</p>
            <p class="match-result-card__model">${cam.model}</p>
            <div class="match-result-card__tags">
              ${cam.tags.map(t => `<span class="match-result-card__tag">${t}</span>`).join('')}
            </div>
            <p class="match-result-card__price">${cam.priceSummary}</p>
            <div style="display:flex;gap:8px;">
              <a href="price.html?q=${encodeURIComponent(cam.brand + ' ' + cam.model)}"
                 class="btn btn--ghost" style="flex:1;font-size:0.78rem;padding:8px 10px;">자세히 보기</a>
              <button class="cam-add-compare-btn" data-id="${cam.id}" type="button"
                style="flex:1;padding:8px 10px;border-radius:var(--radius-sm);border:1.5px solid var(--color-border);background:transparent;font-size:0.78rem;font-weight:600;color:var(--color-text-secondary);cursor:pointer;transition:all 0.18s;display:flex;align-items:center;justify-content:center;gap:5px;">
                + 비교함 담기
              </button>
            </div>
          </div>
        </div>
      `).join('');

      grid.querySelectorAll('.cam-add-compare-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.id;
          const cam = CAMERAS.find(c => c.id === id);
          if (!cam || !window.PicoryCompare) return;
          if (window.PicoryCompare.has(id)) { btn.textContent = '✓ 담김'; return; }
          const added = window.PicoryCompare.add(cam);
          if (added) {
            btn.style.background = 'var(--color-accent)';
            btn.style.borderColor = 'var(--color-accent)';
            btn.style.color = '#fff';
            btn.textContent = '✓ 담김';
          } else {
            btn.textContent = '최대 3개';
            setTimeout(() => { btn.textContent = '+ 비교함 담기'; }, 1500);
          }
        });
      });
    }

    // ── Screen transitions ────────────────────────
    function showQuiz() {
      document.getElementById('introScreen').style.display = 'none';
      document.getElementById('quizScreen').classList.add('is-active');
      renderQuestion();
    }

    function showResults() {
      document.getElementById('quizScreen').classList.remove('is-active');
      document.getElementById('resultScreen').classList.add('is-active');
      document.getElementById('pageFooter').style.display = '';
      document.getElementById('progressFill').style.width = '100%';
      renderResults();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function reset() {
      currentQ = 0;
      Object.keys(answers).forEach(k => delete answers[k]);
      document.getElementById('resultScreen').classList.remove('is-active');
      document.getElementById('pageFooter').style.display = 'none';
      document.getElementById('introScreen').style.display = '';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ── Event listeners ───────────────────────────
    document.getElementById('startBtn').addEventListener('click', showQuiz);

    document.getElementById('nextBtn').addEventListener('click', () => {
      if (currentQ < QUESTIONS.length - 1) {
        currentQ++;
        renderQuestion();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } else {
        showResults();
      }
    });

    document.getElementById('prevBtn').addEventListener('click', () => {
      if (currentQ > 0) {
        currentQ--;
        renderQuestion();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });

    document.getElementById('retryBtn').addEventListener('click', reset);

    buildStrip();
  })();
  </script>
</body>
</html>
